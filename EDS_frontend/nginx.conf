server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25m;

    # Django endpoints — proxied to the `backend` Compose service.
    # Matches EDS_backend/EDS_backend/urls.py: /admin, /swagger(.json), /redoc,
    # Content app at /content, Expert_Registration app under /api.
    location ~ ^/(api|admin|content|static|media|swagger|swagger\.json|redoc)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React SPA (client-side routing fallback).
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
